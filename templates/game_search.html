{% extends "base.html" %}

{% block title %}Game Search{% endblock %}

{% block content %}

<h1 class="main-heading">Game Search</h1>

<div class="search">
  <form method="POST" , action="{{ url_for('game_search') }}">
    <input class="form-txt-box" type="text" name="game_search" placeholder="What are you searching for?" />
    <button class="sub-btn" type="submit">Search</button>
  </form>
</div>

{% endblock %}
